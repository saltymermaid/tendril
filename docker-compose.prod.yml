# Tendril — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.production.example to .env and fill in all values
#   2. Ensure Cloudflare Tunnel is configured (see deploy/cloudflared/)
#
# First-time setup:
#   docker compose -f docker-compose.prod.yml up -d db
#   docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
#   docker compose -f docker-compose.prod.yml run --rm backend python -m scripts.seed_production
#   docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: tendril-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tendril-net
    # No ports exposed — only accessible within Docker network
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: tendril-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      ENABLE_DEV_LOGIN: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://tendril.garden}
      DEBUG: "false"
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-tendril}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tendril-net
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: tendril-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tendril-net
    deploy:
      resources:
        limits:
          memory: 128M

  # Cloudflare Tunnel for HTTPS (optional — remove if using reverse proxy)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tendril-tunnel
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    networks:
      - tendril-net
    depends_on:
      - frontend
    profiles:
      - tunnel

  # Database backup cron job
  db-backup:
    image: postgres:16-alpine
    container_name: tendril-db-backup
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./deploy/backups:/backups
      - ./deploy/scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 2 * * * /backup.sh" | crontab -
        crond -f -l 2
    restart: unless-stopped
    networks:
      - tendril-net
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - backup

networks:
  tendril-net:
    driver: bridge

volumes:
  postgres_data:
