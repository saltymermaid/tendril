# Tendril CI/CD Pipeline
# Runs on push to main and pull requests
# Builds, tests, and optionally deploys to production

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/tendril

jobs:
  # ── Backend Checks ──────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary || true

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tendril
          POSTGRES_PASSWORD: tendril
          POSTGRES_DB: tendril_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tendril"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://tendril:tendril@localhost:5432/tendril_test
      SECRET_KEY: test-secret-key
      ENABLE_DEV_LOGIN: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v

  # ── Frontend Checks ─────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Lint
        run: npm run lint || true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install

      - name: Build
        run: npm run build

  # ── Docker Build ────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    # Runs directly on amphitrite (self-hosted runner) — no SSH needed.
    # amphitrite is on a private LAN (192.168.4.173) unreachable from
    # GitHub-hosted runners, so we avoid the i/o timeout by running here.
    # Setup: https://github.com/saltymermaid/tendril/settings/actions/runners
    runs-on: self-hosted
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Deploy
        working-directory: ${{ secrets.DEPLOY_PATH || '/home/saltymermaid/tendril' }}
        run: |
          # Pull latest code
          git pull origin main

          # Pull new images from GHCR
          docker compose -f docker-compose.prod.yml pull backend frontend

          # Run migrations
          docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head

          # Restart services
          docker compose -f docker-compose.prod.yml up -d --no-deps backend frontend

          # Clean up old images
          docker image prune -f

          # Verify health (frontend on FRONTEND_PORT=3000)
          sleep 10
          curl -sf http://localhost:3000/api/health || echo "WARNING: Health check failed"
